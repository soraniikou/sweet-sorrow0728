<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sweet sorrow — そばにいる</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "メイリオ", sans-serif; }
  body { position: relative; background: #d5e3e8; }
  canvas#stream { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; display: block; }
  .overlay { position: fixed; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.25) 100%); pointer-events: none; z-index: 1; }
  .content { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; color: #3a5466; }
  h1 { font-family: "Snell Roundhand", "Apple Chancery", "Segoe Script", "Bradley Hand", cursive; font-size: clamp(2.4rem, 7vw, 4rem); font-weight: 400; font-style: italic; letter-spacing: 0.03em; margin-bottom: 0.6rem; text-shadow: 0 1px 3px rgba(255,255,255,0.7); color: #2d4858; }
  .subtitle { font-size: clamp(0.78rem, 2vw, 0.95rem); font-weight: 300; letter-spacing: 0.22em; margin-bottom: 3rem; opacity: 0.75; text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
  .buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  button { background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.8); color: #3a5466; padding: 0.85rem 2.4rem; font-size: 0.95rem; font-weight: 300; letter-spacing: 0.25em; border-radius: 999px; cursor: pointer; transition: all 0.5s ease; font-family: inherit; box-shadow: 0 4px 16px rgba(100, 130, 150, 0.1); }
  button:hover { background: rgba(255, 255, 255, 0.85); transform: translateY(-2px); }
  button.hidden { display: none; }
  .whisper { margin-top: 2.5rem; font-size: 0.85rem; letter-spacing: 0.22em; opacity: 0; transition: opacity 1.2s ease; color: #4a6478; font-weight: 300; min-height: 1.2em; text-shadow: 0 1px 2px rgba(255,255,255,0.6); }
  .whisper.show { opacity: 0.85; }
  body.playing .content { animation: breathing 6s ease-in-out infinite; }
  @keyframes breathing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
</style>
</head>
<body>
<canvas id="stream"></canvas>
<div class="overlay"></div>
<div class="content">
  <h1>sweet sorrow</h1>
  <p class="subtitle">そばに、誰かの声がある</p>
  <div class="buttons">
    <button id="listenBtn">Listen</button>
    <button id="stopBtn" class="hidden">Stop</button>
  </div>
  <p class="whisper" id="whisper">　</p>
</div>
<audio id="audio" src="0504.mp3" loop preload="auto"></audio>
<script>
const canvas = document.getElementById('stream');
const ctx = canvas.getContext('2d');
let W, H, DPR, isPlaying = false, time = 0, flowAmount = 0;
function resize() { DPR = window.devicePixelRatio || 1; W = window.innerWidth; H = window.innerHeight; canvas.width = W * DPR; canvas.height = H * DPR; canvas.style.width = W + 'px'; canvas.style.height = H + 'px'; ctx.setTransform(DPR, 0, 0, DPR, 0, 0); }
resize();
window.addEventListener('resize', resize);
function drawBase() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#e8f0e8'); grad.addColorStop(0.35, '#dde7e3'); grad.addColorStop(0.55, '#c8d8d8'); grad.addColorStop(0.75, '#9fbac0'); grad.addColorStop(1, '#7fa0a8');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  drawSoftBlob(W*0.2, H*0.65, 280, 'rgba(180,210,200,0.18)');
  drawSoftBlob(W*0.75, H*0.55, 320, 'rgba(150,190,200,0.15)');
  drawSoftBlob(W*0.5, H*0.85, 400, 'rgba(120,160,180,0.13)');
  drawSoftBlob(W*0.1, H*0.4, 240, 'rgba(200,220,210,0.20)');
}
function drawSoftBlob(x, y, r, color) { const g = ctx.createRadialGradient(x, y, 0, x, y, r); g.addColorStop(0, color); g.addColorStop(1, 'rgba(255,255,255,0)'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); }
function drawGrass() {
  ctx.fillStyle = 'rgba(120,150,130,0.25)';
  ctx.beginPath(); ctx.moveTo(0, H*0.5);
  for (let x = 0; x <= W; x += 6) { ctx.lineTo(x, H*0.5 + Math.sin(x*0.012)*6 + Math.sin(x*0.04)*3); }
  ctx.lineTo(W, H*0.5); ctx.lineTo(0, H*0.5); ctx.fill();
  ctx.fillStyle = 'rgba(95,125,105,0.35)';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 6) { ctx.lineTo(x, H*0.92 + Math.sin(x*0.008)*8 + Math.sin(x*0.05)*3); }
  ctx.lineTo(W, H); ctx.fill();
}
const streamLines = [];
for (let i = 0; i < 9; i++) { streamLines.push({ yRatio: 0.55 + (i/9)*0.35, amp: 8 + Math.random()*14, freq: 0.005 + Math.random()*0.008, phase: Math.random()*Math.PI*2, width: 0.6 + Math.random()*1.4, opacity: 0.18 + Math.random()*0.22 }); }
function drawWaterLines() {
  streamLines.forEach((line) => {
    ctx.strokeStyle = `rgba(255,255,255,${line.opacity * (0.4 + flowAmount*0.6)})`;
    ctx.lineWidth = line.width; ctx.lineCap = 'round'; ctx.beginPath();
    const baseY = H * line.yRatio, flowSpeed = time * 0.0006 * flowAmount;
    for (let x = 0; x <= W; x += 3) {
      const wave = Math.sin(x*line.freq + flowSpeed*4 + line.phase) * line.amp * (0.15 + flowAmount*0.85);
      const subtle = Math.sin(time*0.0004 + line.phase) * 1.5;
      const y = baseY + wave + subtle;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
}
const sparkles = [];
for (let i = 0; i < 22; i++) { sparkles.push({ x: Math.random()*1000, y: 500 + Math.random()*300, vx: 0.4 + Math.random()*1.2, vy: (Math.random()-0.5)*0.15, r: 0.8 + Math.random()*1.8, opacity: 0.3 + Math.random()*0.5, twinkle: Math.random()*Math.PI*2 }); }
function drawSparkles() {
  if (flowAmount < 0.05) return;
  sparkles.forEach((p) => {
    p.x += p.vx*flowAmount; p.y += p.vy*flowAmount; p.twinkle += 0.05;
    if (p.x > W+10) { p.x = -10; p.y = H*(0.55 + Math.random()*0.38); }
    if (p.y < H*0.5 || p.y > H*0.95) { p.y = H*(0.55 + Math.random()*0.38); }
    const tw = (Math.sin(p.twinkle)+1)*0.5;
    ctx.fillStyle = `rgba(255,255,255,${p.opacity*flowAmount*tw})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
}
const leaves = [];
for (let i = 0; i < 4; i++) { leaves.push({ x: Math.random()*1000, y: 500 + Math.random()*200, vx: 0.15 + Math.random()*0.25, rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.005, size: 4 + Math.random()*4, color: `rgba(${130+Math.random()*40},${150+Math.random()*30},${110+Math.random()*30},0.5)` }); }
function drawLeaves() {
  leaves.forEach((leaf) => {
    leaf.x += leaf.vx*flowAmount; leaf.rot += leaf.rotSpeed*flowAmount;
    if (leaf.x > W+20) { leaf.x = -20; leaf.y = H*(0.6 + Math.random()*0.3); }
    ctx.save(); ctx.translate(leaf.x, leaf.y); ctx.rotate(leaf.rot);
    ctx.fillStyle = leaf.color; ctx.beginPath(); ctx.ellipse(0, 0, leaf.size, leaf.size*0.4, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });
}
function loop() {
  const target = isPlaying ? 1 : 0;
  flowAmount += (target - flowAmount)*0.02;
  drawBase(); drawGrass(); drawWaterLines(); drawLeaves(); drawSparkles();
  time += 16;
  requestAnimationFrame(loop);
}
loop();
const audio = document.getElementById('audio');
const listenBtn = document.getElementById('listenBtn');
const stopBtn = document.getElementById('stopBtn');
const whisper = document.getElementById('whisper');
const messages = ['ひとりじゃない','そっと、ここにいる','声が、流れている','だいじょうぶ'];
let messageIndex = 0, messageTimer = null;
function showNextMessage() { whisper.classList.remove('show'); setTimeout(() => { whisper.textContent = messages[messageIndex % messages.length]; whisper.classList.add('show'); messageIndex++; }, 800); }
listenBtn.addEventListener('click', () => {
  audio.currentTime = 0;
  audio.play().then(() => {
    isPlaying = true; document.body.classList.add('playing');
    listenBtn.classList.add('hidden'); stopBtn.classList.remove('hidden');
    showNextMessage(); messageTimer = setInterval(showNextMessage, 8000);
  }).catch((e) => { whisper.textContent = '音声を読み込めませんでした'; whisper.classList.add('show'); console.error(e); });
});
stopBtn.addEventListener('click', () => {
  audio.pause(); audio.currentTime = 0; isPlaying = false;
  document.body.classList.remove('playing');
  stopBtn.classList.add('hidden'); listenBtn.classList.remove('hidden');
  if (messageTimer) { clearInterval(messageTimer); messageTimer = null; }
  whisper.classList.remove('show');
  setTimeout(() => { whisper.textContent = '　'; }, 1000);
  messageIndex = 0;
});
</script>
</body>
</html>
