<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sweet sorrow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #eaf3f7 0%, #dbe9f0 50%, #c9dde6 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴ ProN W3", "メイリオ", sans-serif;
    color: #3a5a6a;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .screen {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    width: 100%;
    max-width: 32rem;
  }

  .screen[hidden] {
    display: none !important;
  }

  h1 {
    font-family: "Great Vibes", cursive;
    font-size: clamp(2.8rem, 10vw, 4.2rem);
    font-weight: 400;
    letter-spacing: 0.06em;
    margin-bottom: 2.5rem;
    color: #4a6b7c;
  }

  .buttons {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    color: #4a6b7c;
    padding: 0.85rem 2.4rem;
    font-size: 0.95rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.4s ease;
    font-family: inherit;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.8);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(120, 160, 180, 0.2);
  }

  button:active {
    transform: translateY(0);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 2rem;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    opacity: 0;
    transition: opacity 0.6s ease;
    color: #6a8b9c;
    font-weight: 300;
  }

  .status.show {
    opacity: 0.7;
  }
</style>
</head>
<body>
  <!-- 初期: Listen のみ -->
  <div class="screen" id="screenIntro">
    <h1>sweet sorrow</h1>
    <div class="buttons">
      <button type="button" id="listenBtn">Listen</button>
    </div>
    <p class="status" id="statusIntro">　</p>
  </div>

  <!-- 再生中: Stop のみ（ループは Stop まで） -->
  <div class="screen" id="screenPlay" hidden>
    <h1>sweet sorrow</h1>
    <div class="buttons">
      <button type="button" id="stopBtn">Stop</button>
    </div>
    <p class="status" id="statusPlay">　</p>
  </div>

  <audio id="audio" src="0504.mp4" preload="auto"></audio>

<script>
  const audio = document.getElementById('audio');
  const screenIntro = document.getElementById('screenIntro');
  const screenPlay = document.getElementById('screenPlay');
  const listenBtn = document.getElementById('listenBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusIntro = document.getElementById('statusIntro');
  const statusPlay = document.getElementById('statusPlay');

  listenBtn.addEventListener('click', () => {
    audio.loop = true;
    audio.currentTime = 0;
    audio.play().then(() => {
      screenIntro.hidden = true;
      screenPlay.hidden = false;
      statusPlay.textContent = 'ループ再生中';
      statusPlay.classList.add('show');
    }).catch((e) => {
      statusIntro.textContent = '音声を読み込めませんでした';
      statusIntro.classList.add('show');
      console.error(e);
    });
  });

  stopBtn.addEventListener('click', () => {
    audio.pause();
    audio.currentTime = 0;
    audio.loop = false;
    screenPlay.hidden = true;
    screenIntro.hidden = false;
    statusPlay.textContent = '　';
    statusPlay.classList.remove('show');
  });
</script>
</body>
</html>
